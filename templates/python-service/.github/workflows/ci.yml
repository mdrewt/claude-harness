name: CI
on:
  push: { branches: [master] }
  pull_request:
# Cancel superseded runs on the same ref (PR push / branch update) to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
      - name: Dependency review (SCA on PRs)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
      - uses: astral-sh/setup-uv@v3
      - uses: extractions/setup-just@v2
      - run: just setup
      - run: just lint
      - run: just typecheck
      - run: just test            # pytest with --cov-fail-under (standards/testing-tdd.md)
      - run: just eval
      - name: SCA (pip-audit)
        run: uv run pip-audit
      - name: SAST (Semgrep)
        run: pipx run semgrep scan --config auto --error
      - name: SBOM
        uses: anchore/sbom-action@v0
